<style>
    button[data-action="stop"] {
    display: none;
    }
    button[data-action="start"] {
    display: none;
    }
    /* Öne çıkanlar slider – üst hiza, kesilme önleme */
    .slider .product-slider .tns-item,
    .slider .product-slider .item {
        box-sizing: border-box;
        vertical-align: top;
    }
    .slider .product-slider .item a {
        display: block;
        text-align: center;
    }
    .slider .product-slider .item img.slider-image {
        max-width: 100%;
        height: auto;
        max-height: 30vh;
        min-height: 120px;
        object-fit: contain;
        display: block;
        margin-left: auto;
        margin-right: auto;
    }
</style>

<div class="container add-site-content-margin slider">
        <div class="product-slider-wrapper" style="padding-left: 12px; padding-right: 12px;">
        <div class="product-slider h-10" id="product-slider">
            {% for book in books %}
                <div class="item">
                    <a class="item img book-{{forloop.index}}" href="{{ book.url }}">
                        <img class="img-fluid h-25 slider-image cover-shadow" src="/{{ book.image }}" alt="{{ book.title }}">
                    </a>
                </div>
            {% endfor %}   
        </div>
        </div>
</div>

<!-- tiny slider -->
<script src="{{site.baseurl}}/assets/js/tiny-slider.js"></script>
<script>
  var productslider = tns({
    container: '.product-slider',
    items: 2,
    autoHeight: true,
    slideBy: 'page',
    mouseDrag: true,
    swipeAngle: false,
    loop: true,
    autoplay: true,
    speed: 600,
    controls: false,
    nav: false,
    prevButton: true,
    nextButton: true,
    autoplayButton: false,
    edgePadding: 15,
    gutter: 10,
    responsive: {
      576: { items: 2 },
      768: { items: 4 },
      992: { items: 5 },
      1140: { items: 5 }
    }
  });
</script>
